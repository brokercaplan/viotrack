name: Scrape Miami Beach Violations

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC (4am ET)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "VioTrack Bot"
          git config user.email "actions@github.com"
          git add data/violations.json
          git diff --staged --quiet || git commit -m "update violations data [skip ci]"
          git push
